[env:esp32dev]
platform = espressif32
board = esp32dev            ; troque se sua placa for outra (esp32-s3-devkitc-1,
                             ; esp32-c3-devkitm-1, wemos_d1_mini32, etc.)
framework = arduino

; ---------------- build / otimizacao ----------------
build_type = release
build_unflags =
    -Os                      ; remove a otimizacao padrao "tamanho" do Arduino-ESP32
build_flags =
    -O2                      ; prioriza velocidade de execucao em vez de tamanho de flash
    -D CORE_DEBUG_LEVEL=0    ; desliga os logs internos do core (menos overhead no Serial)

; ---------------- monitor / upload ----------------
monitor_speed = 115200       ; tem que bater com Serial.begin() no main.cpp
monitor_filters = esp32_exception_decoder
upload_speed = 921600        ; flash mais rapido; o PlatformIO cai pra um valor
                              ; menor sozinho se o cabo/placa nao aguentar

; ---------------- bibliotecas ----------------
lib_deps =
    bogde/HX711 @ ^0.7.5
